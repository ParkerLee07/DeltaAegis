name: DeltaAegis CI

on:
  push:
  pull_request:

jobs:
  python-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Python syntax
        shell: bash
        run: |
          mapfile -t core_python < <(
            find deltaaegis_core -maxdepth 1 -type f -name '*.py' -print | sort
          )
          python3 -W error::SyntaxWarning -m py_compile \
            deltaaegis.py \
            "${core_python[@]}" \
            tools/bootstrap_first_admin.py \
            tools/reset_dashboard_admin.py \
            tools/deltaaegis_troubleshooter.py \
            tools/audit_v0_44_repository.py \
            tools/validate_v0_44_1_repository_hygiene.py
      - name: Run regression tests
        run: python3 -m unittest discover -s tests -p 'test*.py' -v
      - name: Validate repository hygiene
        run: python3 tools/validate_v0_44_1_repository_hygiene.py
